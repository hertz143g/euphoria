<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Эйфория</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-canvas" id="homeScreen" aria-label="Эйфория">
      <img class="logo-img doodle" src="./images/logo.png" alt="Эйфория" />
      <img class="slogan-img doodle" src="./images/slogan.png" alt="свобода тут!" />

      <button class="image-button receive-button" type="button" id="openReceive" aria-label="Получить">
        <img src="./images/receive.png" alt="" />
      </button>

      <button class="image-button enter-button" type="button" id="enterButton" aria-label="Войти">
        <img src="./images/enter.png" alt="" />
      </button>

      <img class="arrow-img doodle" src="./images/strela.png" alt="" aria-hidden="true" />
      <img class="photo-img doodle" src="./images/photo.png" alt="Домик и человечки" />
    </main>

    <section class="dashboard-screen" id="dashboardScreen" aria-label="Личный кабинет" hidden>
      <div class="dashboard-inner">
        <img class="dashboard-logo" src="./images/logo.png" alt="Эйфория" />
        <h1>личный кабинет</h1>
        <div class="sketch-card">
          <img class="your-img" src="./images/your.png" alt="ваши устройства:" />
          <p>пока пусто. потом сюда прикрутим впн.</p>
          <button class="image-button-inline add-button" type="button" aria-label="Добавить устройство">
            <img src="./images/add.png" alt="" />
          </button>
        </div>
        <button class="text-button back-button" type="button" id="backButton">назад</button>
      </div>
    </section>

    <div class="modal-layer" id="receiveModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <form class="hand-modal" id="receiveForm" novalidate>
        <button class="close-button" type="button" data-close-modal aria-label="Закрыть">x</button>

        <label class="mail-field">
          <img class="mail-img" src="./images/mail.png" alt="" />
          <span class="visually-hidden">почта</span>
          <input class="mail-input" type="email" name="email" autocomplete="email" inputmode="email" />
        </label>

        <p class="form-error" id="formError" role="alert"></p>
        <button class="text-button submit-button" type="submit">получить</button>
      </form>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
